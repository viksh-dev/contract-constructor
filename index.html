<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор NDA | JURIXXX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">Alfa-LegalTech</div>
            <ul class="nav-menu">
    <li><a href="index.html" class="active">Конструктор NDA</a></li>
    <li><a href="templates.html">Шаблоны документов</a></li>
    <li><a href="analytics.html">Аналитика рисков</a></li>
</ul>
        </div>
    </nav>

    <div class="container">
        <header>
            <p class="subtitle">Интеллектуальная автоматизация комплаенса</p>
            <h1>Конструктор коммерческих соглашений</h1>
        </header>

        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="nda">Соглашение NDA</button>
            <button class="tab-btn" data-tab="service">Договор оказания услуг</button>
        </div>

        <div class="main-content">
            <section class="form-section">
                <h2>Параметры спецификации</h2>
                <form id="contractForm">
                    <div class="form-group">
                        <label for="clientType">Субъектный состав сделки</label>
                        <select id="clientType">
                            <option value="b2b">Юридическое лицо / ИП (B2B)</option>
                            <option value="b2c">Физическое лицо / Фрилансер (B2C)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="partyName">Наименование контрагента</label>
                        <input type="text" id="partyName" placeholder="ООО 'Вектор' или ИНН / ФИО фрилансера" required>
                    </div>

                    <div class="form-group">
                        <label for="penaltyAmount">Штраф за нарушение обязательств (₽)</label>
                        <input type="number" id="penaltyAmount" value="500000" step="50000">
                    </div>

                    <div class="form-group">
                        <label for="termMonths">Срок действия ограничений</label>
                        <select id="termMonths">
                            <option value="12">12 месяцев (1 год)</option>
                            <option value="36" selected>36 месяцев (3 года)</option>
                            <option value="60">60 месяцев (5 лет)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="governingLaw">Применимое законодательство и право</label>
                        <select id="governingLaw">
                            <option value="rf">Законодательство Российской Федерации (ГК РФ)</option>
                            <option value="england">Английское право (English Law / Применяется только для MNDA)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="confidentialityScope">Объем передаваемых сведений</label>
                        <select id="confidentialityScope">
                            <option value="all">Все передаваемые устные и письменные сведения</option>
                            <option value="marked">Только сведения с грифом 'Коммерческая тайна'</option>
                        </select>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="includeArbitration" checked>
                        <label for="includeArbitration">Включить условие об Арбитражном суде г. Москвы</label>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="personalData" checked>
                        <label for="personalData


обавить оговорку о защите ПДн (ФЗ-152)</label>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="intellectualProperty" checked>
                        <label for="intellectualProperty">Гарантия чистоты интеллектуальных прав (IP)</label>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="nonSolicitation">
                        <label for="nonSolicitation">Оговорка о запрете переманивания сотрудников (Non-solicitation)</label>
                    </div>

                    <button type="button" id="generateBtn" class="btn">Сгенерировать документ</button>
                </form>
            </section>

            <section class="preview-section">
                <h2>Документ экспресс-генерации</h2>
                <div class="document-box" id="documentOutput">
                    <p class="placeholder-text">Заполните форму параметров и запустите генерацию</p>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
