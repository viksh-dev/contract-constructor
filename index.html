<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор NDA | Alfa-LegalTech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-container">
            <div class="nav-brand">jURIX</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Конструктор NDA</a></li>
                <li><a href="templates.html">Шаблоны документов</a></li>
                <li><a href="analytics.html">Аналитика рисков</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header>
            <h1>Конструктор соглашений NDA</h1>
            <p class="subtitle">Интеллектуальная автоматизация комплаенса и генерации документов банка</p>
        </header>

        <div class="main-content">
            <section class="form-section">
                <h2>Параметры спецификации</h2>
                <form id="contractForm">
                    <div class="form-group">
                        <label for="clientType">Субъектный состав сделки:</label>
                        <select id="clientType">
                            <option value="b2b">Юридическое лицо / ИП (B2B)</option>
                            <option value="b2c">Физическое лицо / Фрилансер (B2C)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="partyName">Наименование контрагента:</label>
                        <input type="text" id="partyName" placeholder="ООО 'Вектор' или ИНН / ФИО фрилансера" required>
                    </div>

                    <div class="form-group">
                        <label for="penaltyAmount">Штраф за разглашение тайны (₽):</label>
                        <input type="number" id="penaltyAmount" value="500000" step="50000">
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="includeArbitration" checked>
                        <label for="includeArbitration">Включить условие об Арбитражном суде г. Москвы</label>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="personalData" checked>
                        <label for="personalData">Добавить оговорку о защите ПДн (ФЗ-152)</label>
                    </div>

                    <button type="button" id="generateBtn" class="btn">Сгенерировать документ</button>
                </form>
            </section>

            <section class="preview-section">
                <h2>Документ экспресс-генерации</h2>
                <div class="document-box" id="documentOutput">
                    <p class="placeholder-text">Заполните форму параметров и запустите генерацию</p>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
